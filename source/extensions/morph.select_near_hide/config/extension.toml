[package]
title = "Select Near Hide"
version = "0.1.0"  # Semantic Versioning is used: https://semver.org/
description = "선택된 prim 주변(sibling) prim을 비활성화하거나 반투명하게 처리합니다."
category = "Viewer"  # How to categorize this in the Extension Manager
changelog = "docs/CHANGELOG.md"
icon = "data/icon.png"  # Icon to show in the Extension Manager
keywords = ["kit", "viewer", "prim", "visibility", "hide", "transparent"]  # Search keywords for the Extension Manager
preview_image = "data/preview.png"  # Preview to show in the Extension Manager
readme  = "docs/README.md"  # Path (relative to the root) or content of readme markdown file for UI
repository = "https://github.com/NVIDIA-Omniverse/kit-app-template"  # URL of the extension source repository


[dependencies]
"omni.kit.viewport.utility" = {}

[settings]


[[python.module]]  # Main python module this extension provides, it will be publicly available as "import morph.select_near_hide"
name = "morph.select_near_hide"


[documentation]
pages = [
    "docs/Overview.md",
    "docs/CHANGELOG.md",
]


[[test]]
dependencies = [
]

args = [
]